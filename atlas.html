<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas - Enterprise OS</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@300;400;500&display=swap");
      :root {
        --bg-primary: #0a0b0e;
        --bg-surface: #111318;
        --bg-elevated: #181b22;
        --bg-card: #1e2028;
        --border-subtle: rgba(255, 255, 255, 0.05);
        --border-default: rgba(255, 255, 255, 0.08);
        --border-emphasis: rgba(255, 255, 255, 0.14);
        --text-primary: #ecedf0;
        --text-secondary: #9097a6;
        --text-muted: #555d6e;
        --positive: #3d9e6e;
        --negative: #c94f4f;
        --warning: #b87d3a;
        --neutral: #5a7db5;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-size: 13px;
        line-height: 1.4;
        overflow: hidden;
      }
      /* Typography */
      h1,
      h2,
      h3 {
        font-weight: 500;
        letter-spacing: -0.3px;
      }
      h1 {
        font-size: 28px;
      }
      h2 {
        font-size: 22px;
      }
      h3 {
        font-size: 18px;
      }
      .mono {
        font-family: "DM Mono", monospace;
      }
      .uppercase {
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .muted {
        color: var(--text-muted);
      }
      .secondary {
        color: var(--text-secondary);
      }
      /* Logo */
      .logo {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .logo-text .atlas {
        font-size: 15px;
        font-weight: 600;
        line-height: 1;
      }
      .logo-text .enterprise {
        font-size: 9px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        line-height: 1;
      }
      /* Nav tabs */
      .nav-tabs {
        display: flex;
        gap: 0;
      }
      .nav-tab {
        background: none;
        border: none;
        color: var(--text-secondary);
        font-size: 12.5px;
        padding: 12px 16px;
        cursor: pointer;
        transition: all 150ms ease;
      }
      .nav-tab:hover {
        background: var(--bg-elevated);
        color: var(--text-primary);
      }
      .nav-tab.active {
        background: var(--bg-card);
        color: var(--text-primary);
      }
      /* Period selector */
      .period-selector {
        display: flex;
        gap: 0;
        margin-right: 16px;
      }
      .period-btn {
        background: none;
        border: 1px solid var(--border-default);
        border-right: none;
        color: var(--text-secondary);
        font-size: 11px;
        padding: 4px 12px;
        cursor: pointer;
        transition: all 150ms ease;
      }
      .period-btn:first-child {
        border-radius: 6px 0 0 6px;
      }
      .period-btn:last-child {
        border-radius: 0 6px 6px 0;
        border-right: 1px solid var(--border-default);
      }
      .period-btn:hover {
        background: var(--bg-elevated);
        color: var(--text-primary);
      }
      .period-btn.active {
        background: var(--text-primary);
        color: var(--bg-primary);
        border-color: var(--text-primary);
      }
      /* Nav right */
      .nav-right {
        display: flex;
        align-items: center;
        gap: 16px;
      }
      .divider {
        width: 1px;
        height: 20px;
        background: var(--border-subtle);
      }
      .entity-switcher {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 11px;
        color: var(--text-secondary);
      }
      .status-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--positive);
      }
      .user-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: var(--bg-elevated);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 500;
      }
      /* Sidebar */
      .sidebar-section {
        margin-bottom: 24px;
      }
      .section-label {
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 8px;
        padding: 0 20px;
      }
      .sidebar-item {
        padding: 8px 20px;
        cursor: pointer;
        transition: all 150ms ease;
        font-size: 13px;
      }
      .sidebar-item:hover {
        background: var(--bg-elevated);
      }
      .sidebar-item.active {
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .badge {
        background: var(--negative);
        color: var(--text-primary);
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 10px;
        margin-left: 8px;
      }
      .entities-list {
        padding: 0 20px;
      }
      .sidebar-entity-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        cursor: pointer;
        transition: all 150ms ease;
        font-size: 12px;
      }
      .sidebar-entity-item:hover {
        background: var(--bg-elevated);
      }
      .entity-color {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .add-entity-btn {
        width: calc(100% - 40px);
        margin: 16px 20px;
        padding: 10px;
        background: transparent;
        border: 1px solid var(--border-default);
        color: var(--text-secondary);
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        transition: all 150ms ease;
      }
      .add-entity-btn:hover {
        border-color: var(--border-emphasis);
        color: var(--text-primary);
      }
      /* Buttons */
      .btn-ghost {
        background: transparent;
        border: 1px solid var(--border-default);
        color: var(--text-secondary);
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        transition: all 150ms ease;
      }
      .btn-ghost:hover {
        border-color: var(--border-emphasis);
        color: var(--text-primary);
      }
      .btn-primary {
        background: var(--text-primary);
        border: 1px solid var(--text-primary);
        color: var(--bg-primary);
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 12px;
        transition: all 150ms ease;
      }
      .btn-primary:hover {
        opacity: 0.92;
      }
      /* Cards */
      .card {
        background: var(--bg-card);
        border: 1px solid var(--border-default);
        border-radius: 8px;
        padding: 20px 24px;
      }
      .kpi-card {
        background: var(--bg-card);
        border: 1px solid var(--border-default);
        border-radius: 8px;
        padding: 20px 24px;
      }
      .kpi-label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 4px;
      }
      .kpi-value {
        font-family: "DM Mono", monospace;
        font-size: 24px;
        font-weight: 300;
        margin-bottom: 8px;
      }
      .kpi-delta {
        font-size: 11px;
        font-family: "DM Mono", monospace;
      }
      /* Status badges */
      .status-badge {
        font-size: 11px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 12px;
        text-transform: uppercase;
      }
      .status-on-track {
        background: rgba(61, 158, 110, 0.12);
        color: var(--positive);
      }
      .status-at-risk {
        background: rgba(184, 125, 58, 0.12);
        color: var(--warning);
      }
      .status-critical {
        background: rgba(201, 79, 79, 0.12);
        color: var(--negative);
      }
      .status-inactive {
        background: rgba(255, 255, 255, 0.05);
        color: var(--text-muted);
      }
      /* Tables */
      .table {
        width: 100%;
        border-collapse: collapse;
      }
      .table th,
      .table td {
        padding: 12px;
        text-align: left;
        border-bottom: 1px solid var(--border-subtle);
      }
      .table th {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.5px;
        font-weight: 500;
      }
      .table tbody tr:nth-child(even) {
        background: var(--bg-surface);
      }
      .table tbody tr:nth-child(odd) {
        background: var(--bg-elevated);
      }
      /* Scrollbars */
      ::-webkit-scrollbar {
        width: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border-default);
        border-radius: 2px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--border-emphasis);
      }
      /* Layouts */
      .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 12px;
        margin-bottom: 28px;
      }
      .command-center-content {
        display: grid;
        grid-template-columns: 1fr 320px;
        gap: 24px;
      }
      .table-controls {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }
      .entity-table-section {
        background: var(--bg-surface);
        border: 1px solid var(--border-default);
        border-radius: 8px;
        padding: 20px;
      }
      .right-panel {
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .alerts-list {
        margin-top: 16px;
      }
      .alert-item {
        display: flex;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--border-subtle);
      }
      .alert-item:last-child {
        border-bottom: none;
      }
      .alert-content {
        flex: 1;
      }
      .alert-message {
        font-size: 12px;
        line-height: 1.4;
        margin-bottom: 4px;
      }
      .alert-time {
        font-size: 11px;
        color: var(--text-muted);
      }
      .alert-dismiss {
        background: none;
        border: none;
        color: var(--text-muted);
        cursor: pointer;
        font-size: 16px;
        padding: 0;
      }
      .view-all {
        margin-top: 16px;
        font-size: 12px;
        color: var(--text-secondary);
        cursor: pointer;
      }
      .activity-list {
        margin-top: 16px;
      }
      .activity-item {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 0;
        font-size: 12px;
      }
      .activity-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }
      .activity-entity {
        font-weight: 500;
      }
      .activity-action {
        flex: 1;
      }
      .activity-time {
        color: var(--text-muted);
      }
      .entity-row:hover {
        background: var(--bg-card) !important;
      }
      .entity-row.selected {
        background: var(--bg-card) !important;
        border-left: 3px solid var(--text-primary);
      }
      .negative {
        color: var(--negative);
      }
      .positive {
        color: var(--positive);
      }
      .neutral {
        color: var(--neutral);
      }
      /* Entities View */
      .page-header {
        margin-bottom: 24px;
      }
      .page-subtitle {
        color: var(--text-secondary);
        font-size: 14px;
        margin-top: 4px;
      }
      .entities-controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
      }
      .filter-tabs {
        display: flex;
        gap: 0;
      }
      .filter-tab {
        background: var(--bg-elevated);
        border: 1px solid var(--border-default);
        border-right: none;
        color: var(--text-secondary);
        padding: 8px 16px;
        cursor: pointer;
        font-size: 12px;
        transition: all 150ms ease;
      }
      .filter-tab:first-child {
        border-radius: 6px 0 0 6px;
      }
      .filter-tab:last-child {
        border-radius: 0 6px 6px 0;
        border-right: 1px solid var(--border-default);
      }
      .filter-tab:hover {
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .filter-tab.active {
        background: var(--bg-card);
        color: var(--text-primary);
        border-color: var(--border-emphasis);
      }
      .controls-right {
        display: flex;
        gap: 12px;
      }
      .entity-cards {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 16px;
      }
      .entity-card {
        position: relative;
        padding: 0;
      }
      .entity-card.at-risk {
        border-left: 3px solid var(--warning);
      }
      .entity-card.critical {
        border-left: 3px solid var(--negative);
        background: rgba(201, 79, 79, 0.02);
      }
      .entity-header {
        position: relative;
      }
      .entity-color-bar {
        height: 4px;
        width: 100%;
        border-radius: 8px 8px 0 0;
      }
      .entity-info {
        padding: 16px 20px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .entity-name {
        font-size: 14px;
        margin: 0;
      }
      .industry-badge {
        align-self: flex-start;
        font-size: 10px;
        padding: 2px 8px;
      }
      .entity-kpis {
        padding: 16px 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .kpi-mini {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .kpi-mini .kpi-label {
        font-size: 10px;
      }
      .kpi-mini .kpi-value {
        font-size: 13px;
      }
      .entity-footer {
        padding: 16px 20px;
        border-top: 1px solid var(--border-subtle);
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
      }
      .entity-details {
        font-size: 11px;
        color: var(--text-muted);
      }
      .detail-item {
        margin-bottom: 2px;
      }
      .entity-actions {
        display: flex;
        gap: 8px;
      }
      /* Entity Detail */
      .entity-meta {
        display: flex;
        gap: 8px;
        margin-top: 8px;
      }
      .entity-detail-kpis {
        margin-bottom: 24px;
      }
      .entity-detail-content {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 24px;
      }
      .detail-panel {
        padding: 20px;
      }
      .info-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 16px;
      }
      .back-btn {
        margin-bottom: 16px;
      }
      /* Financials View */
      .financials-controls {
        display: flex;
        gap: 12px;
        align-items: center;
      }
      .view-toggle {
        display: flex;
        gap: 0;
        margin-bottom: 24px;
      }
      .toggle-btn {
        background: var(--bg-elevated);
        border: 1px solid var(--border-default);
        border-right: none;
        color: var(--text-secondary);
        padding: 10px 20px;
        cursor: pointer;
        font-size: 13px;
        transition: all 150ms ease;
      }
      .toggle-btn:first-child {
        border-radius: 6px 0 0 6px;
      }
      .toggle-btn:last-child {
        border-radius: 0 6px 6px 0;
        border-right: 1px solid var(--border-default);
      }
      .toggle-btn:hover {
        background: var(--bg-card);
        color: var(--text-primary);
      }
      .toggle-btn.active {
        background: var(--bg-card);
        color: var(--text-primary);
        border-color: var(--border-emphasis);
      }
      .pl-table-container {
        background: var(--bg-surface);
        border: 1px solid var(--border-default);
        border-radius: 8px;
        padding: 20px;
        margin-bottom: 24px;
      }
      .pl-table th {
        background: var(--bg-elevated);
      }
      .subtotal-row {
        background: var(--bg-card) !important;
        font-weight: 500;
      }
      .financials-panels {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 16px;
      }
      .panel h3 {
        margin-bottom: 16px;
      }
      .contributors-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .contributor {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .entity-short {
        width: 60px;
        font-size: 11px;
        font-weight: 500;
      }
      .bar-container {
        flex: 1;
        height: 8px;
        background: var(--bg-elevated);
        border-radius: 4px;
      }
      .bar {
        height: 100%;
        background: var(--positive);
        border-radius: 4px;
      }
      .amount {
        width: 80px;
        text-align: right;
        font-size: 12px;
      }
      .cost-breakdown {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .cost-item {
        display: flex;
        justify-content: space-between;
        font-size: 12px;
      }
      .margin-comparison {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .margin-item {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .margin-bar {
        height: 8px;
        background: var(--neutral);
        border-radius: 4px;
        min-width: 20px;
      }
      .margin-pct {
        width: 50px;
        text-align: right;
        font-size: 12px;
      }
      /* Operations View */
      .operations-stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 12px;
        margin-bottom: 24px;
      }
      .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--border-default);
        border-radius: 8px;
        padding: 16px 20px;
      }
      .stat-label {
        font-size: 11px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.6px;
        margin-bottom: 4px;
      }
      .stat-value {
        font-size: 18px;
        font-weight: 500;
      }
      .projects-controls {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }
      .projects-table-container {
        background: var(--bg-surface);
        border: 1px solid var(--border-default);
        border-radius: 8px;
        padding: 20px;
      }
      .projects-table th {
        background: var(--bg-elevated);
      }
      .progress-bar {
        position: relative;
        width: 60px;
        height: 8px;
        background: var(--bg-elevated);
        border-radius: 4px;
      }
      .progress-fill {
        height: 100%;
        background: var(--positive);
        border-radius: 4px;
      }
      .progress-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 10px;
        color: var(--text-primary);
        font-weight: 500;
      }
      /* Reports View */
      .reports-section {
        margin-bottom: 32px;
      }
      .reports-section h2 {
        font-size: 18px;
        margin-bottom: 16px;
      }
      .templates-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
        gap: 16px;
      }
      .template-card {
        padding: 20px;
        display: flex;
        flex-direction: column;
      }
      .template-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 12px;
      }
      .template-header h3 {
        font-size: 16px;
        margin: 0;
      }
      .template-format {
        background: var(--bg-elevated);
        padding: 2px 8px;
        border-radius: 4px;
        font-size: 10px;
        color: var(--text-secondary);
      }
      .template-description {
        color: var(--text-secondary);
        font-size: 13px;
        line-height: 1.4;
        margin-bottom: 16px;
      }
      .template-meta {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 16px;
      }
      .template-meta > div {
        margin-bottom: 4px;
      }
      .template-actions {
        display: flex;
        gap: 8px;
        margin-top: auto;
      }
      .recent-reports-table th {
        background: var(--bg-elevated);
      }
      #top-nav {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 52px;
        background: var(--bg-surface);
        border-bottom: 1px solid var(--border-subtle);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 28px;
        z-index: 100;
      }
      #sidebar {
        position: fixed;
        left: 0;
        top: 52px;
        bottom: 0;
        width: 220px;
        background: var(--bg-surface);
        border-right: 1px solid var(--border-subtle);
        overflow-y: auto;
        padding: 20px 0;
      }
      #main-content {
        margin-left: 220px;
        margin-top: 52px;
        padding: 28px;
        height: calc(100vh - 52px);
        overflow-y: auto;
        background: var(--bg-primary);
      }
    </style>
  </head>
  <body>
    <div id="top-nav">
      <div class="logo">
        <svg
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect x="4" y="4" width="16" height="16" rx="2" fill="white" />
          <rect
            x="8"
            y="8"
            width="8"
            height="8"
            rx="1"
            fill="var(--bg-primary)"
          />
        </svg>
        <div class="logo-text">
          <div class="atlas">Atlas</div>
          <div class="enterprise">Enterprise OS</div>
        </div>
      </div>
      <div class="nav-tabs">
        <button class="nav-tab active" data-view="command-center">
          Command Center
        </button>

                              <div class="page-header">
                                <h1>Consolidated Financials</h1>
                                <div class="financials-controls">
                                  <div class="period-selector">
                                    <button class="period-btn active" data-period="mtd">MTD</button>
                                    <button class="period-btn" data-period="qtd">QTD</button>
                                    <button class="period-btn" data-period="ytd">YTD</button>
                                  </div>
                                  <button class="btn-ghost">Export to PDF</button>
                                  <button class="btn-primary">Generate Board Report</button>
                                </div>
                              </div>
                              <div class="view-toggle">
                                <button class="toggle-btn active" data-view="consolidated">Consolidated View</button>
                                <button class="toggle-btn" data-view="per-entity">Per-Entity Breakdown</button>
                              </div>
                              <div class="pl-table-container">
                                <!-- Table will be rendered here -->
                              </div>
                              <div class="financials-panels">
                                <div class="panel card">
                                  <h3>Top Revenue Contributors</h3>
                                  <div class="contributors-list">
                                    ${data.entities.sort((a,b) => b.monthlyRevenue - a.monthlyRevenue).slice(0,5).map(entity => `
                                      <div class="contributor">
                                        <span class="entity-short">${entity.shortName}</span>
                                        <div class="bar-container">
                                          <div class="bar" style="width: ${(entity.monthlyRevenue / data.entities[0].monthlyRevenue) * 100}%"></div>
                                        </div>
                                        <span class="amount mono">${formatCurrency(entity.monthlyRevenue)}</span>
                                      </div>
                                    `).join('')}
                                  </div>
                                </div>
                                <div class="panel card">
                                  <h3>Cost Breakdown</h3>
                                  <div class="cost-breakdown">
                                    <div class="cost-item"><span>Salaries & Wages</span><span class="mono">44%</span></div>
                                    <div class="cost-item"><span>Logistics & Distribution</span><span class="mono">24%</span></div>
                                    <div class="cost-item"><span>General & Admin</span><span class="mono">12%</span></div>
                                    <div class="cost-item"><span>Rent & Facilities</span><span class="mono">9%</span></div>
                                    <div class="cost-item"><span>Technology</span><span class="mono">6%</span></div>
                                    <div class="cost-item"><span>Marketing</span><span class="mono">5%</span></div>
                                  </div>
                                </div>
                                <div class="panel card">
                                  <h3>Margin Comparison</h3>
                                  <div class="margin-comparison">
                                    ${data.entities.map(entity => `
                                      <div class="margin-item">
                                        <span class="entity-short">${entity.shortName}</span>
                                        <div class="margin-bar" style="width: ${Math.max(0, entity.profitMargin)}%"></div>
                                        <span class="margin-pct mono">${formatPercentage(entity.profitMargin)}</span>
                                      </div>
                                    `).join('')}
                                  </div>
                                </div>
                              </div>
                            `;

                            renderTable();

                            // Toggle view
                            container.querySelectorAll('.toggle-btn').forEach(btn => {
                              btn.addEventListener('click', () => {
                                container.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
                                btn.classList.add('active');
                                viewMode = btn.dataset.view;
                                renderTable();
                              });
                            });

                            // Period buttons (dummy for now)
                            container.querySelectorAll('.period-btn').forEach(btn => {
                              btn.addEventListener('click', () => {
                                container.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                                btn.classList.add('active');
                              });
                            });
                          }

                                                // Initialize
                                                document.addEventListener("DOMContentLoaded", () => {
                                                  // Populate sidebar entities
                                                  const entitiesList = document.querySelector(".entities-list");
                                                  data.entities.forEach((entity) => {
                                                    const item = document.createElement("div");
                                                    item.className = "sidebar-entity-item";
                                                    item.innerHTML = `
                                                <span class="entity-color" style="background-color: ${entity.color}"></span>
                                                ${entity.shortName}
                                                <span class="status-dot ${entity.status.toLowerCase().replace(" ", "-")}"></span>
                                              `;
                                                    item.addEventListener("click", () =>
                                                      switchView("entity-detail-" + entity.shortName.toLowerCase()),
                                                    );
                                                    entitiesList.appendChild(item);
                                                  });

                                                  // Event listeners
                                                  document.querySelectorAll(".nav-tab").forEach((btn) => {
                                                    btn.addEventListener("click", () => switchView(btn.dataset.view));
                                                  });
                                                  document.querySelectorAll(".sidebar-item").forEach((item) => {
                                                    item.addEventListener("click", () => switchView(item.dataset.view));
                                                  });
                                                  document.querySelectorAll(".period-btn").forEach((btn) => {
                                                    btn.addEventListener("click", () => switchPeriod(btn.dataset.period));
                                                  });

                                                  // Initial render
                                                  renderView();
                                                });
    </script>
  </body>
</html>
